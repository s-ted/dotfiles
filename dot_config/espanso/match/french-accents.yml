# French Accents

matches:
  - trigger: ";e;'"
    replace: "é"

  - trigger: ";e;`"
    replace: "è"

  - trigger: ";e;^"
    replace: "ê"

  - trigger: ";o;^"
    replace: "ô"

  - trigger: ";a;`"
    replace: "à"

  - trigger: ";a;^"
    replace: "â"

  - trigger: ";i;^"
    replace: "î"

  - trigger: ";u;`"
    replace: "ù"

  - trigger: ";u;^"
    replace: "û"

  - trigger: "E'"
    replace: "É"

  - trigger: "E`"
    replace: "È"

  - trigger: "E^"
    replace: "Ê"

  - trigger: "O^"
    replace: "Ô"

  - trigger: "A`"
    replace: "À"

  - trigger: "A^"
    replace: "Â"

  - trigger: "I^"
    replace: "Î"

  - trigger: "U`"
    replace: "Ù"

  - trigger: "U^"
    replace: "Û"
